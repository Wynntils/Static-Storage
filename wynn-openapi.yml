        the <Badge intent="warning" minimal>GUILD</Badge> rate-limit bucket. See [Throttling and Rate
        Limits](/welcome#throttling-and-rate-limits).

        </Note>

        Use the `identifier` query parameter with either `username` or `uuid` to control how guild members are
        identified in the response.
      tags:
        - subpackage_guild
      parameters:
        - name: query
          in: path
          required: true
          schema:
            type: string
        - name: identifier
          in: query
          description: Switches player descriptor between either their username or their uuid.
          required: false
          schema:
            $ref: '#/components/schemas/GuildUuidQueryGetParametersIdentifier'
      responses:
        '200':
          description: Guild detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Guild'
        '404':
          description: No matching guild was found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /guild/{query}:
    get:
      operationId: get-guild-by-name
      summary: Get guild by name
      description: >-
        <Note>

        This endpoint is cached for <Badge intent="success" minimal>2 minutes</Badge> in the <Badge intent="warning"
        minimal>USER</Badge> cache source.   See [Caching](/welcome#caching). <Indent></Indent> This endpoint belongs to
        the <Badge intent="warning" minimal>GUILD</Badge> rate-limit bucket. See [Throttling and Rate
        Limits](/welcome#throttling-and-rate-limits).

        </Note>

        Name queries are case-insensitive.

        Use the `identifier` query parameter with either `username` or `uuid` to control how guild members are
        identified in the response.
      tags:
        - subpackage_guild
      parameters:
        - name: query
          in: path
          required: true
          schema:
            type: string
        - name: identifier
          in: query
          description: Switches player descriptor between either their username or their uuid.
          required: false
          schema:
            $ref: '#/components/schemas/GuildQueryGetParametersIdentifier'
      responses:
        '200':
          description: Guild detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Guild'
        '404':
          description: No matching guild was found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /item/database:
    get:
      operationId: list-items
      summary: List item database entries
      description: >-
        <Note>

        This endpoint is cached for <Badge intent="error" minimal>1 hour</Badge> in the <Badge intent="success"
        minimal>SHARED</Badge> cache source.   See [Caching](/welcome#caching). <Indent></Indent> This endpoint belongs
        to the <Badge intent="warning" minimal>ITEMS</Badge> rate-limit bucket. See [Throttling and Rate
        Limits](/welcome#throttling-and-rate-limits).

        </Note>


        Items use the [API Markup parser](/welcome#api-markup-parser) for Major IDs.


        <Info>

        `fullResult` bypasses pagination and returns the `results` object for all objects at once.

        </Info>


        This endpoint uses the generic pagination response format.


        <Footer>

        Enum values in these docs are based on the item metadata available on April 23, 2026. New item content can add
        or change values over time.

        </Footer>
      tags:
        - subpackage_item
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: fullResult
          in: query
          description: >-
            Presence-based flag that expands responses. Send it without a value as `?fullResult`. Using
            `?fullResult=true` or `?fullResult=false` is not accepted.
          required: false
          schema:
            $ref: '#/components/schemas/ItemDatabaseGetParametersFullResult'
      responses:
        '200':
          description: Paginated item list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedItemResponse'
  /item/search:
    post:
      operationId: search-items
      summary: Search item database
      description: >-
        <Note>

        This endpoint is cached for <Badge intent="error" minimal>1 hour</Badge> in the <Badge intent="success"
        minimal>SHARED</Badge> cache source.   See [Caching](/welcome#caching). <Indent></Indent> This endpoint belongs
        to the <Badge intent="warning" minimal>ITEMS</Badge> rate-limit bucket. See [Throttling and Rate
        Limits](/welcome#throttling-and-rate-limits).

        </Note>


        Filters can be empty and do not always need to be present in the payload. To understand the endpoint better, try
        the official Wynncraft item guide while monitoring the network tab in your browser devtools.


        <Info>

        `fullResult` bypasses pagination and returns the `results` object for all objects at once.

        </Info>


        This endpoint uses the generic pagination response format.


        <Footer>

        Enum values in these docs are based on the item metadata available on April 23, 2026. New item content can add
        or change values over time.

        </Footer>
      tags:
        - subpackage_item
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: fullResult
          in: query
          description: >-
            Presence-based flag that expands responses. Send it without a value as `?fullResult`. Using
            `?fullResult=true` or `?fullResult=false` is not accepted.
          required: false
          schema:
            $ref: '#/components/schemas/ItemSearchPostParametersFullResult'
      responses:
        '200':
          description: Paginated search results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedItemResponse'
        '400':
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: No items matched the request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemSearchRequest'
  /item/search/{query}:
    get:
      operationId: quick-search-items
      summary: Quick item search
      description: >-
        <Note>

        This endpoint is cached for <Badge intent="error" minimal>1 hour</Badge> in the <Badge intent="success"
        minimal>SHARED</Badge> cache source.   See [Caching](/welcome#caching). <Indent></Indent> This endpoint belongs
        to the <Badge intent="warning" minimal>ITEMS</Badge> rate-limit bucket. See [Throttling and Rate
        Limits](/welcome#throttling-and-rate-limits).

        </Note>


        Items use the [API Markup parser](/welcome#api-markup-parser) for Major IDs.


        <Footer>

        Enum values in these docs are based on the item metadata available on April 23, 2026. New item content can add
        or change values over time.

        </Footer>
      tags:
        - subpackage_item
      parameters:
        - name: query
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Item matches.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemDatabaseFull'
        '404':
          description: No items matched the query.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /item/metadata:
    get:
      operationId: get-item-metadata
      summary: Get item filter metadata
      description: >-
        <Note>

        This endpoint is cached for <Badge intent="success" minimal>3 minutes</Badge> in the <Badge intent="success"
        minimal>SHARED</Badge> cache source.   See [Caching](/welcome#caching). <Indent></Indent> This endpoint belongs
        to the <Badge intent="warning" minimal>ITEMS</Badge> rate-limit bucket. See [Throttling and Rate
        Limits](/welcome#throttling-and-rate-limits).

        </Note>

        Returns all available filters for advanced item search. If you need an exact filter or lookup key, this endpoint
        is the authoritative source.


        <Info>

        Prefer `?static` when you only need the static lookup map. The default response also includes website-oriented
        filter groupings used by the item guide.

        </Info>
      tags:
        - subpackage_item
      parameters:
        - name: static
          in: query
          description: >-
            Presence-based flag that returns only the static metadata payload. Prefer sending it as `?static`.
            `?static=` is also accepted.
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Filter metadata or static metadata only.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item_getItemMetadata_Response_200'
  /item/sets:
    get:
      operationId: list-item-sets
      summary: List item sets
      description: >-
        <Note>

        This endpoint is cached for <Badge intent="success" minimal>2 minutes</Badge> in the <Badge intent="success"
        minimal>SHARED</Badge> cache source.   See [Caching](/welcome#caching). <Indent></Indent> This endpoint belongs
        to the <Badge intent="warning" minimal>ITEMS</Badge> rate-limit bucket. See [Throttling and Rate
        Limits](/welcome#throttling-and-rate-limits).

        </Note>
      tags:
        - subpackage_item
      responses:
        '200':
          description: Item set map keyed by set name.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/ItemSet'
  /ability/tree/{tree}:
    get:
      operationId: get-ability-tree
      summary: Get class ability tree
      description: >-
        <Note>

        This endpoint is cached for <Badge intent="error" minimal>1 hour</Badge> in the <Badge intent="success"
        minimal>SHARED</Badge> cache source.   See [Caching](/welcome#caching). <Indent></Indent> This endpoint belongs
        to the <Badge intent="warning" minimal>SHARED</Badge> rate-limit bucket. See [Throttling and Rate
        Limits](/welcome#throttling-and-rate-limits).

        </Note>


        Ability and aspect responses use the [API Markup parser](/welcome#api-markup-parser).


        Use these endpoints together to render a player ability tree like the in-game view:

        - [GET /ability/tree/{tree}](api:GET/ability/tree/{tree})

        - [GET /ability/map/{tree}](api:GET/ability/map/{tree})

        - [GET /player/{username}/characters/{uuid}/abilities](api:GET/player/{username}/characters/{uuid}/abilities)
      tags:
        - subpackage_ability
      parameters:
        - name: tree
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/AbilityTreeTreeGetParametersTree'
      responses:
        '200':
          description: Ability tree definition.
          content:
            application/json:
              schema:
