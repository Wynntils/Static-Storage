openapi: 3.1.0
info:
  title: Modules
  version: 1.0.0
paths:
  /player:
    get:
      operationId: list-online-players
      summary: List online players
      description: >-
        <Note>

        This endpoint is cached for <Badge intent="success" minimal>30 seconds</Badge> in the <Badge intent="warning"
        minimal>USER</Badge> cache source.   See [Caching](/welcome#caching). <Indent></Indent> This endpoint belongs to
        the <Badge intent="warning" minimal>PLAYER</Badge> rate-limit bucket. See [Throttling and Rate
        Limits](/welcome#throttling-and-rate-limits).

        </Note>


        <Warning>

        Online player list is subject to [Access Rules](/privacy), which can hide some players from the list. Rely on
        the field `total` to have the accurate player count.

        </Warning>
      tags:
        - subpackage_player
      parameters:
        - name: identifier
          in: query
          description: Switches player descriptor between either their username or their uuid.
          required: false
          schema:
            $ref: '#/components/schemas/PlayerGetParametersIdentifier'
        - name: server
          in: query
          description: Filter online players to a specific world such as `WC1` or `1`.
          required: false
          schema:
            $ref: '#/components/schemas/PlayerGetParametersServer'
      responses:
        '200':
          description: Online player summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnlinePlayerList'
  /player/whoami:
    get:
      operationId: get-player-identity
      summary: Who Am I
      description: >-
        <Note>

        This endpoint is not cached.   See [Caching](/welcome#caching). <Indent></Indent> This endpoint belongs to the
        <Badge intent="warning" minimal>PLAYER</Badge> rate-limit bucket. See [Throttling and Rate
        Limits](/welcome#throttling-and-rate-limits).

        </Note>


        <Warning>

        Try it will not return usable data for this route. It depends on authentication and IP-aware context, so test it
        against the live API outside the docs.

        </Warning>


        Data returned here depends on the accounts you used to join Wynncraft. Those accounts represent who we think you
        are and are used for account-aware features such as store auto-login and map live position viewing.
      tags:
        - subpackage_player
      responses:
        '200':
          description: Identity mapping keyed by player UUID.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/PlayerIdentity'
        '403':
          description: No eligible online identity could be resolved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /player/{username}:
    get:
      operationId: get-player
      summary: Get player profile
      description: >-
        <Note>

        This endpoint is cached for <Badge intent="success" minimal>2 minutes</Badge> in the <Badge intent="warning"
        minimal>USER</Badge> cache source.   See [Caching](/welcome#caching). <Indent></Indent> This endpoint belongs to
        the <Badge intent="warning" minimal>PLAYER</Badge> rate-limit bucket. See [Throttling and Rate
        Limits](/welcome#throttling-and-rate-limits).

        </Note>


        <Warning>

        Player stats are subject to [Access Rules](/privacy), which can hide some of the stats. Check the `restrictions`
        object to see which access rules affected the response.

        </Warning>

        <Info>

        It is recommended to request players by UUID. Username lookups can return `300 MultipleObjectsReturned` with a
        multi-selector response when more than one player matches the query.

        </Info>

        `previousRanking` is stored daily based on player activity. Subtracting `previousRanking` from the current
        ranking gives the player's leaderboard progression.


        <Info>

        Use `fullResult` to include full character data. The `characters` object uses the same structure as [GET
        /player/{username}/characters/{uuid}](api:GET/player/{username}/characters/{uuid}).

        </Info>
      tags:
        - subpackage_player
      parameters:
        - name: username
          in: path
          description: Username or UUID accepted by the player route.
          required: true
          schema:
            type: string
        - name: fullResult
          in: query
          description: >-
            Presence-based flag that expands responses. Send it without a value as `?fullResult`. Using
            `?fullResult=true` or `?fullResult=false` is not accepted.
          required: false
          schema:
            $ref: '#/components/schemas/PlayerUsernameGetParametersFullResult'
      responses:
        '200':
          description: Player profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Player'
        '404':
          description: No matching player was found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Player payload construction failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /player/{username}/characters:
    get:
      operationId: list-player-characters
      summary: List a player's characters
      description: >-
        <Note>

        This endpoint is cached for <Badge intent="success" minimal>2 minutes</Badge> in the <Badge intent="warning"
        minimal>USER</Badge> cache source.   See [Caching](/welcome#caching). <Indent></Indent> This endpoint belongs to
        the <Badge intent="warning" minimal>PLAYER</Badge> rate-limit bucket. See [Throttling and Rate
        Limits](/welcome#throttling-and-rate-limits).

        </Note>


        <Warning>

        This response can be restricted by player [Access Rules](/privacy).

        </Warning>

        <Info>

        It is recommended to request players by UUID. Username lookups can return `300 MultipleObjectsReturned` with a
        multi-selector response when more than one player matches the query.

        </Info>


        Returns the player's characters keyed by character UUID.
      tags:
        - subpackage_player
      parameters:
        - name: username
          in: path
          description: Username or UUID accepted by the player route.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Character map keyed by character UUID.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/LightCharacter'
        '400':
          description: The player has no characters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Character list visibility is restricted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: No matching player was found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Player payload construction failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /player/{username}/characters/{uuid}:
    get:
      operationId: get-player-character
      summary: Get detailed character data
      description: >-
        <Note>

        This endpoint is cached for <Badge intent="success" minimal>2 minutes</Badge> in the <Badge intent="warning"
        minimal>USER</Badge> cache source.   See [Caching](/welcome#caching). <Indent></Indent> This endpoint belongs to
        the <Badge intent="warning" minimal>PLAYER</Badge> rate-limit bucket. See [Throttling and Rate
        Limits](/welcome#throttling-and-rate-limits).

        </Note>


        <Warning>

        Character data is subject to [Access Rules](/privacy), which can hide some stats. Check the `restrictions`
        object to see which access rules affected the response. You can also check the `removedStat` field to check when
        the character skeleton customization affect the response.

        </Warning>

        <Info>

        It is recommended to request players by UUID. Username lookups can return `300 MultipleObjectsReturned` with a
        multi-selector response when more than one player matches the query.

        </Info>


        Returns the full stat payload for a single character.
      tags:
        - subpackage_player
      parameters:
        - name: username
          in: path
          description: Username or UUID accepted by the player route.
          required: true
          schema:
            type: string
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Character detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Character'
        '400':
          description: Unknown character UUID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Character data visibility is restricted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: No matching player was found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Player payload construction failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /player/{username}/characters/{uuid}/abilities:
    get:
      operationId: get-player-character-abilities
      summary: Get character ability map
      description: >-
        <Note>

        This endpoint is cached for <Badge intent="warning" minimal>10 minutes</Badge> in the <Badge intent="warning"
        minimal>USER</Badge> cache source.   See [Caching](/welcome#caching). <Indent></Indent> This endpoint belongs to
        the <Badge intent="warning" minimal>PLAYER</Badge> rate-limit bucket. See [Throttling and Rate
        Limits](/welcome#throttling-and-rate-limits).

        </Note>

        <Warning>

        Ability Tree is subject to [Access Rules](/privacy), which can make it unavailable.

        </Warning>

        <Info>

        It is recommended to request players by UUID. Username lookups can return `300 MultipleObjectsReturned` with a
        multi-selector response when more than one player matches the query.

        </Info>

        This endpoint only lists abilities the player has enabled and performs pathfinding on the fly.


        To render a full in-game style ability tree, combine this response with:

        - [GET /ability/tree/{tree}](api:GET/ability/tree/{tree})

        - [GET /ability/map/{tree}](api:GET/ability/map/{tree}) 
      tags:
        - subpackage_player
      parameters:
        - name: username
          in: path
          description: Username or UUID accepted by the player route.
          required: true
          schema:
            type: string
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Ability tree nodes grouped by page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AbilityMapPages'
        '400':
          description: Unknown character UUID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Ability tree visibility is restricted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: No matching player was found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: The character ability tree could not be rendered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /guild/list/guild:
    get:
      operationId: list-guilds
      summary: List guilds
      description: >-
        <Note>

        This endpoint is cached for <Badge intent="error" minimal>1 hour</Badge> in the <Badge intent="success"
        minimal>SHARED</Badge> cache source.   See [Caching](/welcome#caching). <Indent></Indent> This endpoint belongs
        to the <Badge intent="warning" minimal>GUILD</Badge> rate-limit bucket. See [Throttling and Rate
        Limits](/welcome#throttling-and-rate-limits).

        </Note>
      tags:
        - subpackage_guild
      parameters:
        - name: identifier
          in: query
          description: Switches player descriptor between either their username or their uuid.
          required: false
          schema:
            $ref: '#/components/schemas/GuildListGuildGetParametersIdentifier'
      responses:
        '200':
          description: Guild directory keyed by name or UUID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Guild_listGuilds_Response_200'
  /guild/list/territory:
    get:
      operationId: list-guild-territories
      summary: List territories
      description: >-
        <Note>

        This endpoint is cached for <Badge intent="success" minimal>10 seconds</Badge> in the <Badge intent="success"
        minimal>SHARED</Badge> cache source.   See [Caching](/welcome#caching). <Indent></Indent> This endpoint belongs
        to the <Badge intent="warning" minimal>GUILD</Badge> rate-limit bucket. See [Throttling and Rate
        Limits](/welcome#throttling-and-rate-limits).

        </Note>
      tags:
        - subpackage_guild
      responses:
        '200':
          description: Territory ownership map keyed by territory name.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/Territory'
        '500':
          description: Territory list cache could not be loaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /guild/prefix/{query}:
    get:
      operationId: get-guild-by-prefix
      summary: Get guild by prefix
      description: >-
        <Note>

        This endpoint is cached for <Badge intent="success" minimal>2 minutes</Badge> in the <Badge intent="warning"
        minimal>USER</Badge> cache source.   See [Caching](/welcome#caching). <Indent></Indent> This endpoint belongs to
        the <Badge intent="warning" minimal>GUILD</Badge> rate-limit bucket. See [Throttling and Rate
        Limits](/welcome#throttling-and-rate-limits).

        </Note>

        <Info>

        Prefix lookups can return `300 MultipleObjectsReturned` with a multi-selector response when more than one guild
        matches the query.

        </Info>

        Prefix queries are useful when your input is a guild tag rather than a full guild name.


        Use the `identifier` query parameter with either `username` or `uuid` to control how guild members are
        identified in the response.
      tags:
        - subpackage_guild
      parameters:
        - name: query
          in: path
          required: true
          schema:
            type: string
        - name: identifier
          in: query
          description: Switches player descriptor between either their username or their uuid.
          required: false
          schema:
            $ref: '#/components/schemas/GuildPrefixQueryGetParametersIdentifier'
      responses:
        '200':
          description: Guild detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Guild'
        '400':
          description: The provided guild prefix is malformed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: No matching guild was found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /guild/uuid/{query}:
