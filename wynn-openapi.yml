        This endpoint is cached for <Badge intent="warning" minimal>10 minutes</Badge> in the <Badge intent="success"
        minimal>SHARED</Badge> cache source.   See [Caching](/welcome#caching). <Indent></Indent> This endpoint belongs
        to the <Badge intent="warning" minimal>LEADERBOARDS</Badge> rate-limit bucket. See [Throttling and Rate
        Limits](/welcome#throttling-and-rate-limits).

        </Note>


        Use this list to know which leaderboard types can be requested from `GET /leaderboards/{lb_type}`.
      tags:
        - subpackage_leaderboards
      responses:
        '200':
          description: Leaderboard type identifiers.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
  /leaderboards/{lb_type}:
    get:
      operationId: get-leaderboard
      summary: Get leaderboard entries
      description: >-
        <Note>

        This endpoint is cached for <Badge intent="warning" minimal>10 minutes</Badge> in the <Badge intent="warning"
        minimal>USER</Badge> cache source.   See [Caching](/welcome#caching). <Indent></Indent> This endpoint belongs to
        the <Badge intent="warning" minimal>LEADERBOARDS</Badge> rate-limit bucket. See [Throttling and Rate
        Limits](/welcome#throttling-and-rate-limits).

        </Note>


        Leaderboards update every 10 minutes for online players. Players who go offline between update intervals are
        flagged to update on the next interval.


        Use `resultLimit` with an integer below 1000 to limit the response size. The default limit is `100`.


        Character-based leaderboards can include `characterUuid` and `characterType`, such as profession or gamemode
        leaderboards.


        `metadata` contains variable keys depending on the leaderboard type. Some gamemode leaderboards also include
        top-level `characterData`, which has the same structure as player character data.


        Some entries also include optional rank presentation fields such as `rank`, `supportRank`, `shortenedRank`,
        `legacyRankColour`, and `rankBadge`.


        Raid leaderboards include a score and gambits used. Completion starts at 200, then adds +10, +20, or +30 for
        each gambit.


        `previousRanking` is stored daily depending on player activity. Subtracting `previousRanking` from the current
        ranking gives the player's leaderboard progression.
      tags:
        - subpackage_leaderboards
      parameters:
        - name: lb_type
          in: path
          description: Leaderboard identifier such as `playerContent`.
          required: true
          schema:
            type: string
        - name: resultLimit
          in: query
          description: Defaults to 100.
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Leaderboard entries keyed by ranking position.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/LeaderboardEntry'
        '400':
          description: Invalid leaderboard type.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
