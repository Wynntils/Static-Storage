# Github actions runner will run this script on a schedule

name: Update OpenAPI Spec
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight

jobs:
  update-openapi-spec:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.1

      - name: Fetch OpenAPI spec
        run: curl -o wynn-openapi.yml "https://docs.wynncraft.com/openapi.yml"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6.0.2
        with:
          token: ${{ secrets.PRIVATE_TOKEN }}
          labels: auto-generated
          committer: 'WynntilsBot <admin@wynntils.com>'
          author: 'WynntilsBot <admin@wynntils.com>'
          commit-message: "chore: [auto-generated] Update Wynncraft OpenAPI spec"
          title: "chore: [auto-generated] Update Wynncraft OpenAPI spec"
          body: |
            The Wynncraft OpenAPI spec at docs.wynncraft.com has been updated.

            Review the diff for new endpoints, changed schemas, or removed fields that may affect generators or the Wynntils mod.

            This PR has been automatically generated.
          branch: update-openapi-spec
